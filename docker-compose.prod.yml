services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped

    volumes:
      - mongodb_data:/data/db

    networks:
      - app-network

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    restart: unless-stopped

    env_file:
      - ./backend/.env

    depends_on:
      mongodb:
        condition: service_healthy

    networks:
      - app-network

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile

    restart: unless-stopped

    ports:
      - "80:80"

    depends_on:
      - backend

    networks:
      - app-network

volumes:
  mongodb_data:

networks:
  app-network:
    driver: bridge