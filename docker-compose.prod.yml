services:
  mongodb:
    image: mongo:7.0

    restart: unless-stopped

    volumes:
      - mongodb_data:/data/db

    networks:
      - app-network

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: ghcr.io/hira-islam/gitlens-ai-backend:${IMAGE_TAG}

    restart: unless-stopped

    env_file:
      - ./.env.backend

    depends_on:
      mongodb:
        condition: service_healthy

    networks:
      - app-network

  nginx:
    image: ghcr.io/hira-islam/gitlens-ai-nginx:${IMAGE_TAG}

    restart: unless-stopped

    ports:
      - "80:8080"

    depends_on:
      - backend

    networks:
      - app-network

volumes:
  mongodb_data:

networks:
  app-network:
    driver: bridge