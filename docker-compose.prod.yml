services:
  mongodb:
    image: mongo:7.0

    restart: unless-stopped

    volumes:
      - mongodb_data:/data/db

    networks:
      - app-network

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: ghcr.io/hira-islam/gitlens-ai-backend:${IMAGE_TAG}

    restart: unless-stopped

    env_file:
      - ./.env.backend

    depends_on:
      mongodb:
        condition: service_healthy

    networks:
      - app-network

  nginx:
    image: ghcr.io/hira-islam/gitlens-ai-nginx:${IMAGE_TAG}

    restart: unless-stopped

    ports:
      - "80:8080"

    depends_on:
      - backend

    networks:
      - app-network

  prometheus:
    image: prom/prometheus:v3.5.0
    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

    networks:
      - app-network 


  node-exporter:
    image: prom/node-exporter:v1.9.1
    restart: unless-stopped

    pid: host

    command:
      - "--path.rootfs=/host"

    volumes:
      - "/:/host:ro,rslave"

    ports:
      - "9100:9100"

    networks:
      - app-network 

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    restart: unless-stopped

    ports:
      - "8081:8080"

    volumes:
      - "/:/rootfs:ro"
      - "/var/run:/var/run:ro"
      - "/sys:/sys:ro"
      - "/var/lib/docker:/var/lib/docker:ro"

    privileged: true

    devices:
      - "/dev/kmsg"

    networks:
      - app-network

  grafana:
    image: grafana/grafana:12.1.1
    restart: unless-stopped

    ports:
      - "3000:3000"

    volumes:
      - grafana_data:/var/lib/grafana

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

    depends_on:
      - prometheus

    networks:
      - app-network   

volumes:
  mongodb_data:
  prometheus_data:
  grafana_data:

networks:
  app-network:
    driver: bridge