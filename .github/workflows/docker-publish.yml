name: Build and Publish Docker Images

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Backend Image
        run: |
          docker build \
            -t ghcr.io/${{ env.IMAGE_OWNER }}/gitlens-ai-backend:latest \
            ./backend

      - name: Push Backend Image
        run: |
          docker push \
            ghcr.io/${{ env.IMAGE_OWNER }}/gitlens-ai-backend:latest

      - name: Build Frontend Image
        run: |
          docker build \
            -t ghcr.io/${{ env.IMAGE_OWNER }}/gitlens-ai-frontend:latest \
            ./frontend/frontend

      - name: Push Frontend Image
        run: |
          docker push \
            ghcr.io/${{ env.IMAGE_OWNER }}/gitlens-ai-frontend:latest